<script>
// ══════════════════════════════════════════
// RNG — детерминированный
// ══════════════════════════════════════════
function RNG(seed){
  this.s = (seed ^ 0xdeadbeef) >>> 0;
  this.next = function(){
    this.s = (Math.imul(this.s, 747796405) + 2891336453) >>> 0;
    let z = this.s;
    z = Math.imul(z ^ (z >>> 16), 0x45d9f3b) >>> 0;
    z = Math.imul(z ^ (z >>> 16), 0x45d9f3b) >>> 0;
    return (z ^ (z >>> 16)) / 4294967296;
  };
  this.f = function(lo,hi){ return lo + this.next()*(hi-lo); };
}

// ДНК: 8 генов
// 0=тело  1=броня  2=поза  3=цвет  4=фон  5=детали  6=небо  7=размер
const MAX_GEN=30, N_VAR=2, MIN_DIFF=0.70;
let GEN=1, PARENT=null;

function mkDNA(seed){
  const r=new RNG(seed);
  return Array.from({length:8},()=>r.next());
}

function mutate(parent, seed){
  const r=new RNG(seed);
  return parent.map(p=>{
    const lo=p-MIN_DIFF, hi=p+MIN_DIFF;
    const hasLo=lo>0.001, hasHi=hi<0.999;
    let v;
    if(hasLo&&hasHi){
      v=r.next()<(lo/(lo+(1-hi)))?r.f(0,lo):r.f(hi,1);
    } else if(hasLo){ v=r.f(0,lo);
    } else if(hasHi){ v=r.f(hi,1);
    } else { v=p<0.5?r.f(0.85,1):r.f(0,0.15); }
    return Math.min(1,Math.max(0,v));
  });
}

// ══════════════════════════════════════════
// SVG ГЕНЕРАТОР
// ══════════════════════════════════════════
const W=440, H=260;

function hsl(h,s,l){ return `hsl(${h|0},${s|0}%,${l|0}%)`; }
function lx(h,a){ // lighten hex
  if(!h.startsWith('#'))return h;
  return '#'+[1,3,5].map(i=>Math.min(255,parseInt(h.slice(i,i+2),16)+a).toString(16).padStart(2,'0')).join('');
}
function dk(h,a){ // darken hex
  if(!h.startsWith('#'))return h;
  return '#'+[1,3,5].map(i=>Math.max(0,parseInt(h.slice(i,i+2),16)-a).toString(16).padStart(2,'0')).join('');
}

function getC(dna){
  const temp=dna[3], mood=dna[6];
  let sA,sB,sC;
  if(mood<.25){sA='#f8c030';sB='#80b0e8';sC='#3870d8';}
  else if(mood<.5){sA='#f0e040';sB='#50b8f8';sC='#2888d8';}
  else if(mood<.75){sA='#f06020';sB='#c03810';sC='#781808';}
  else{sA='#080818';sB='#0c1430';sC='#101838';}
  const gh=95+temp*15|0, gl=14+temp*10|0;
  const gnd=hsl(gh,48,gl), gnd2=hsl(gh,42,gl-4), gnd3=hsl(gh,36,gl-8);
  const hH=25+dna[0]*15|0, hS=6+dna[0]*24|0, hL=72+(1-dna[0])*18|0;
  const horse=hsl(hH,hS,hL), horseSh=hsl(hH,hS+10,hL-20);
  const cH=240-temp*230|0;
  const cape=hsl(cH,72,28), capeL=hsl(cH,72,42);
  const aH=200+dna[1]*60|0;
  const armor=hsl(aH,8+dna[1]*20,38+dna[1]*18);
  const helm=hsl(aH,6+dna[1]*16,52+dna[1]*14);
  const helmL=hsl(aH,6+dna[1]*16,66+dna[1]*10);
  const gold=hsl(42,88+temp*8,46+temp*8);
  const goldL=hsl(42,88+temp*8,62+temp*6);
  const skin=hsl(26+temp*6,78+temp*6,58+temp*4);
  const skinD=hsl(26+temp*6,70+temp*6,42+temp*4);
  const beard=hsl(32+temp*8,34+temp*8,58+temp*8);
  const beardL=hsl(32+temp*8,34+temp*8,74+temp*6);
  return{sA,sB,sC,gnd,gnd2,gnd3,horse,horseSh,cape,capeL,armor,helm,helmL,gold,goldL,skin,skinD,beard,beardL};
}

function makeSVG(dna, gen){
  const c=getC(dna);
  const build=dna[0], pose=dna[2], bgd=dna[4], det=dna[5], mood=dna[6], sz=dna[7];
  const SH=Math.round(H*.52);
  const parts=[];
  const r=(x,y,w,h,fill,op)=>{
    if(w<=0||h<=0)return;
    let s=`<rect x="${x|0}" y="${y|0}" width="${Math.max(1,w|0)}" height="${Math.max(1,h|0)}" fill="${fill}"`;
    if(op!=null&&op<1)s+=` opacity="${op.toFixed(2)}"`;
    s+='/>';
    parts.push(s);
  };
  const t=(x,y,txt,fill,sz2,anchor='start')=>{
    parts.push(`<text x="${x|0}" y="${y|0}" fill="${fill}" font-family="monospace" font-size="${sz2}" font-weight="bold" text-anchor="${anchor}">${txt}</text>`);
  };

  // НЕБО
  r(0,0,W,SH,c.sC);
  r(0,0,W,SH*.18,c.sA);
  r(0,SH*.18,W,SH*.30,c.sB);
  r(0,SH*.48,W,SH*.54,c.sC);

  // Звёзды (ночь)
  if(mood>.65){
    const rr=new RNG(42);
    for(let i=0;i<60;i++){
      const br=140+rr.next()*110|0;
      const cl=`#${br.toString(16).padStart(2,'0')}${br.toString(16).padStart(2,'0')}cc`;
      r(rr.next()*W, rr.next()*SH*.9, 2, 2, cl);
    }
  }

  // Солнце/луна
  if(mood<.65){
    const sx=mood<.25?W-80:mood<.5?55:W-70, sy=mood<.5?34:44, sr=22;
    r(sx-sr,sy-sr,sr*2,sr*2,c.gold);
    r(sx-sr+5,sy-sr+5,(sr-5)*2,(sr-5)*2,c.goldL);
    const rr2=new RNG(99);
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2;
      for(let rr3=sr+4;rr3<sr+18;rr3+=4)
        r(sx+Math.cos(a)*rr3-1,sy+Math.sin(a)*rr3-1,3,3,c.gold,.55);
    }
  } else {
    r(W-80,18,40,40,'#e0e0c8'); r(W-74,24,28,28,'#f0f0d8'); r(W-78,18,20,20,c.sC);
  }

  // Облака
  if(mood<.6&&bgd>.1){
    [[68,20,54],[188,13,44],[310,22,50]].forEach(([cx,cy,cw])=>{
      r(cx-cw/2,cy,cw,10,'#f8f8f0'); r(cx-cw/2+6,cy-7,cw-12,10,'#fff');
    });
  }

  // ЗЕМЛЯ
  r(0,SH,W,6,mood>.65?c.gnd2:'#52c018');
  r(0,SH+6,W,9,c.gnd);
  r(0,SH+15,W,12,c.gnd2);
  r(0,SH+27,W,H-SH-27,c.gnd3);

  // Цветы
  if(mood<.65&&bgd>.2){
    const rr4=new RNG(77);
    ['#f82020','#f8f820','#f820f8','#f87820','#20a8f8'].forEach((fc,i)=>{
      const fx=18+i*68+rr4.next()*18;
      r(fx,SH+3,4,5,fc); r(fx+1,SH+8,2,6,c.gnd);
    });
  }

  // ПЕЙЗАЖ — купол
  if(bgd>.1){
    const cx=W*.69|0, cy=SH;
    const q=v=>Math.round(v*(.55+bgd*.38));
    r(cx+q(8),cy-q(22),q(3),q(10),'#c8a000');
    r(cx+q(5),cy-q(16),q(9),q(3),'#c8a000');
    [[14,0],[11,4],[8,8],[5,12],[2,16]].forEach(([w,dy],ji)=>
      r(cx+q(9-w/2),cy-q(14)+q(dy),q(w),q(4),ji%2?'#00a800':'#00c800'));
    r(cx+q(7),cy-q(2),q(8),q(5),'#f0e8d0');
    r(cx,cy,q(22),H-SH,'#f0e8d0');
    r(cx+q(1),cy+1,q(20),H-SH-1,'#f8f0e0');
    r(cx+q(3),cy+q(4),q(6),q(10),'#90c0f8');
    r(cx+q(13),cy+q(4),q(6),q(10),'#90c0f8');
    r(cx+q(8),cy+q(18),q(7),H-SH-q(18),'#704000');
    r(cx,cy-q(2),q(22),q(2),'#c8a000');
  }

  // Берёза
  if(bgd>.35){
    const bx3=W*.82|0, p2=v=>Math.round(v*(.5+bgd*.32)), th=p2(62);
    r(bx3-p2(3),SH-th,p2(6),th,'#f0f0e8'); r(bx3-p2(2),SH-th+1,p2(4),th-2,'#f8f8f0');
    [[8,0],[22,2],[36,1],[48,0]].forEach(([yo,ddx])=>r(bx3-p2(3)+ddx,SH-th+yo,p2(2),p2(3),'#282820'));
    [[0,28],[8,22],[16,16],[24,10],[30,6]].forEach(([yo,w])=>{
      const g=Math.min(200,80+yo*2.5)|0;
      r(bx3-p2(w/2),SH-th-yo,p2(w),p2(7),`#00${g.toString(16).padStart(2,'0')}00`);
    });
  }

  // Частокол
  if(bgd>.52){
    for(let i=0;i<10;i++){const fx=W*.43|0+i*9; r(fx,SH-20,6,20,'#6c3800'); r(fx+1,SH-24,4,6,'#804000');}
    r(W*.43|0,SH-13,90,3,'#5a3000');
  }

  // Доп дерево
  if(bgd>.70){
    const tx=W*.57|0;
    r(tx-3,SH-46,6,46,'#7a4420'); r(tx-2,SH-44,4,44,'#8a5228');
    [[0,26],[8,20],[14,14],[20,8]].forEach(([yo,w])=>{
      const g=Math.min(195,85+yo*2.5)|0;
      r(tx-w/2,SH-46-yo,w,8,`#00${g.toString(16).padStart(2,'0')}00`);
    });
  }

  // ══ КОНЬ ══
  const sc=.52+sz*.54, s=v=>Math.round(v*sc);
  const bW=s(84+build*16|0);
  const OX=10, OY=SH-s(80);

  r(OX+s(8),OY+s(86),bW+s(18),s(8),'#000',.18);
  [[-s(2),s(28)],[s(2),s(33)],[-s(5),s(22)]].forEach(([dx,dy])=>{
    r(OX+dx,OY+dy,s(6),s(18),c.horseSh); r(OX+dx+s(1),OY+dy+s(2),s(4),s(13),c.horse);
  });
  r(OX+s(6),OY+s(20),bW,s(36),c.horse);
  r(OX+s(8),OY+s(22),bW-s(4),s(32),lx(c.horse,10)||c.horse);
  r(OX+s(8),OY+s(40),bW-s(4),s(14),c.horseSh);

  // Попона
  const pw=bW*.62|0;
  r(OX+s(15),OY+s(20),pw,s(12),c.cape);
  r(OX+s(17),OY+s(22),pw-s(4),s(8),c.capeL);
  const no=3+det*5|0;
  for(let i=0;i<no;i++){
    const fx=OX+s(18)+i*(pw/no|0);
    r(fx,OY+s(24),s(5),s(5),c.gold);
    if(det>.3)r(fx+s(1),OY+s(25),s(3),s(3),c.goldL);
  }
  r(OX+s(15),OY+s(32),pw,s(3),c.gold);

  // Грудь+шея+голова коня
  r(OX+bW-s(4),OY+s(16),s(20),s(42),c.horse);
  r(OX+bW-s(2),OY+s(12),s(14),s(10),c.horse);
  r(OX+bW+s(2),OY,s(26),s(24),c.horse);
  r(OX+bW+s(4),OY+s(2),s(22),s(20),c.horse);
  r(OX+bW+s(12),OY-s(4),s(16),s(12),c.horse);
  r(OX+bW+s(14),OY+s(8),s(14),s(16),c.horseSh);
  r(OX+bW+s(14),OY+s(22),s(14),s(5),'#f0a0a0');
  r(OX+bW+s(4),OY+s(4),s(7),s(7),'#181010');
  r(OX+bW+s(6),OY+s(5),s(3),s(3),'#000');
  r(OX+bW+s(7),OY+s(6),s(2),s(2),'#f8f8f8');
  r(OX+bW-s(8),OY,s(12),s(28),c.horseSh);
  r(OX+bW-s(12),OY,s(10),s(18),c.horse);
  r(OX+bW+s(2),OY+s(10),s(28),s(4),c.cape);
  r(OX+bW+s(16),OY+s(10),s(4),s(18),c.cape);

  // Ноги
  const lm=pose<.33?'trot':pose<.66?'gallop':'rear';
  const legs=lm==='trot'?
    [{x:s(10),h:s(26),up:0},{x:s(28),h:s(22),up:0},{x:bW-s(26),h:s(26),up:0},{x:bW-s(10),h:s(22),up:0}]:
    lm==='gallop'?
    [{x:s(10),h:s(28),up:0},{x:s(28),h:s(22),up:0},{x:bW-s(26),h:s(28),up:0},{x:bW-s(10),h:s(12),up:1}]:
    [{x:s(10),h:s(32),up:0},{x:s(28),h:s(30),up:0},{x:bW-s(26),h:s(8),up:1},{x:bW-s(10),h:s(6),up:1}];
  legs.forEach(({x,h,up})=>{
    r(OX+x,OY+s(60),s(10),h,c.horse);
    if(up){r(OX+x+s(2),OY+s(60)+h,s(12),s(12),c.horse);r(OX+x+s(1),OY+s(60)+h+s(10),s(13),s(5),'#282018');}
    else{r(OX+x-s(2),OY+s(60)+h,s(14),s(6),'#282018');}
  });

  // ══ ИЛЬЯ ══
  const IX=OX+s(18), IY=OY-s(18), IW=s(26+build*16|0);
  r(IX-s(12),IY-s(30),s(15),s(60),c.cape);
  r(IX-s(10),IY-s(28),s(11),s(56),c.capeL);
  r(IX-s(16),IY-s(6),s(8),s(34),c.cape);

  // Щит
  const shW=s(18+build*8|0);
  r(IX-s(6),IY-s(28),shW,shW*1.25|0,c.cape);
  r(IX-s(4),IY-s(26),shW-s(4),(shW-s(4))*1.2|0,c.capeL);
  r(IX,IY-s(24),s(8),s(3),c.gold); r(IX+s(3),IY-s(21),s(2),s(10),c.gold);
  r(IX-s(1),IY-s(15),s(10),s(2),c.gold);
  r(IX-s(6),IY-s(30),shW,s(2),c.gold); r(IX-s(6),IY-s(28),s(2),shW*1.25|0,c.gold);

  // Кольчуга
  r(IX+s(8),IY-s(34),IW,s(44),c.armor);
  r(IX+s(10),IY-s(32),IW-s(4),s(40),c.armor);
  const nr=3+det*5|0, nc=2+det*3|0;
  for(let rr5=0;rr5<nr;rr5++)for(let cc=0;cc<nc;cc++){
    r(IX+s(11)+cc*(IW-s(6))/nc|0,IY-s(31)+rr5*s(38)/nr|0,s(5),s(4),c.armor);
    if(det>.3)r(IX+s(12)+cc*(IW-s(6))/nc|0,IY-s(30)+rr5*s(38)/nr|0,s(3),s(2),c.helm);
  }
  r(IX+s(8),IY-s(40),IW*.38|0,s(8),c.helm);
  r(IX+s(8)+IW*.62|0,IY-s(40),IW*.38|0,s(8),c.helm);
  r(IX+s(8),IY+s(9),IW,s(6),c.gold);

  // Сапоги+стремена
  r(IX+s(10),IY+s(15),s(12),s(11),'#501808');
  r(IX+s(10)+IW-s(14),IY+s(15),s(12),s(11),'#501808');
  r(IX+s(8),IY+s(24),s(14),s(4),'#381005');
  r(IX+s(8)+IW-s(14),IY+s(24),s(14),s(4),'#381005');
  r(IX+s(8),IY+s(28),s(14),s(3),c.armor);
  r(IX+s(8)+IW-s(14),IY+s(28),s(14),s(3),c.armor);
  r(IX+s(8)+IW*.35|0,IY-s(40),s(12),s(9),c.skin);

  // ГОЛОВА
  const HX=IX+s(6), HY=IY-s(82), HW=s(22+build*10|0), HH=s(32+build*5|0);
  r(HX,HY,HW,HH,c.skin); r(HX+s(2),HY+s(2),HW-s(4),HH-s(4),c.skin);
  r(HX+s(3),HY+s(7),s(7),s(7),'#181008'); r(HX+s(5),HY+s(9),s(3),s(3),'#000'); r(HX+s(6),HY+s(10),s(2),s(2),'#f8f8f8');
  r(HX+HW-s(10),HY+s(7),s(7),s(7),'#181008'); r(HX+HW-s(8),HY+s(9),s(3),s(3),'#000'); r(HX+HW-s(7),HY+s(10),s(2),s(2),'#f8f8f8');
  r(HX+s(3),HY+s(5),s(7),s(2),c.skinD); r(HX+HW-s(10),HY+s(5),s(7),s(2),c.skinD);
  r(HX+HW/2-s(3)|0,HY+s(15),s(6),s(6),c.skinD);
  r(HX+s(4),HY+s(24),HW-s(8),s(3),c.skinD);

  // Усы
  const mu=1+build*1.8;
  [-1,1].forEach(side=>{
    const ux=side<0?HX-s(4):HX+HW-s(4);
    r(ux,HY+s(20),s(8)*mu*.6|0,s(5),c.beard);
    r(ux+(side<0?-(s(5)*mu*.4|0):s(6)*mu*.35|0),HY+s(15),s(5)*mu*.5|0,s(6),c.beard);
    r(ux+(side<0?-(s(6)*mu*.38|0):s(7)*mu*.32|0),HY+s(9),s(4)*mu*.45|0,s(7),c.beard);
    r(ux+(side<0?-(s(5)*mu*.32|0):s(6)*mu*.28|0),HY+s(3),s(3)*mu*.4|0,s(7),c.beardL);
  });
  r(HX-s(2),HY+HH-s(2),HW+s(4),s(12),c.beard);
  r(HX,HY+HH+s(10),HW,s(9),c.beard);
  r(HX,HY+HH-s(1),HW,s(8),c.beardL);

  // Шлем
  r(HX-s(4),HY-s(20),HW+s(8),s(22),c.helm);
  r(HX-s(2),HY-s(18),HW+s(4),s(18),c.helmL);
  r(HX+HW/2-s(8)|0,HY-s(30),s(16),s(12),c.helm);
  r(HX+HW/2-s(6)|0,HY-s(28),s(12),s(10),c.helmL);
  r(HX+HW/2-s(4)|0,HY-s(38),s(8),s(10),c.helm);
  r(HX+HW/2-s(2)|0,HY-s(42),s(4),s(6),c.helmL);
  r(HX-s(6),HY-s(2),HW+s(12),s(5),c.gold);
  r(HX-s(6),HY-s(2),HW+s(12),s(2),c.goldL);
  r(HX-s(4),HY,s(5),HH+s(12),c.armor); r(HX+HW-s(1),HY,s(5),HH+s(12),c.armor);
  if(det>.3){r(HX+HW/2-s(3)|0,HY-s(40),s(6),s(5),c.gold);r(HX+HW/2-s(5)|0,HY-s(38),s(10),s(2),c.gold);}
  if(det>.6){r(HX-s(8),HY-s(14),s(4),s(4),c.gold);r(HX+HW+s(4),HY-s(14),s(4),s(4),c.gold);}

  // Копьё
  const spX=IX+s(8)+IW+s(10);
  r(spX,IY-s(120),s(5),s(148),'#703808'); r(spX+s(1),IY-s(120),s(2),s(148),'#906018');
  r(spX-s(2),IY-s(124),s(9),s(9),c.helm); r(spX-s(1),IY-s(128),s(7),s(6),c.helmL);
  r(spX,IY-s(134),s(5),s(12),'#f8f0a0');
  const fW=s(18+det*16|0), fH=s(12+det*8|0);
  r(spX+s(4),IY-s(134),fW,fH,c.cape); r(spX+s(4),IY-s(134),fW,fH*.4|0,c.capeL);
  r(spX+s(9),IY-s(134),s(3),fH,c.gold);
  r(spX-s(2),IY-s(72),s(8),s(9),c.skin);

  // ══ АЛЁША ══
  const AX=W*.50|0, AY=SH-s(40), AW=s(20+build*8|0);
  r(AX-s(2),AY+s(70),AW+s(16),s(6),'#000',.15);
  r(AX,AY+s(56),s(11),s(12),'#c00000'); r(AX+AW-s(3),AY+s(56),s(11),s(12),'#c00000');
  r(AX-s(1),AY+s(62),s(13),s(6),'#900000'); r(AX+AW-s(4),AY+s(62),s(13),s(6),'#900000');
  r(AX,AY+s(38),s(11),s(20),'#0828b0'); r(AX+AW-s(3),AY+s(38),s(11),s(20),'#0828b0');
  r(AX-s(2),AY+s(5),AW+s(6),s(36),'#006800'); r(AX,AY+s(7),AW+s(2),s(32),'#009000');
  const nao=2+det*3|0;
  for(let i=0;i<nao;i++){
    const ox2=AX+s(2)+i*((AW+s(2))/nao|0);
    r(ox2,AY+s(9),s(5),s(3),c.gold); r(ox2,AY+s(17),s(5),s(3),c.gold); r(ox2,AY+s(25),s(5),s(3),c.gold);
  }
  r(AX-s(2),AY+s(5),AW+s(6),s(3),c.gold); r(AX-s(2),AY+s(5),s(2),s(36),c.gold); r(AX+AW+s(4),AY+s(5),s(2),s(36),c.gold);
  r(AX-s(2),AY+s(41),AW+s(6),s(5),c.gold); r(AX-s(2),AY+s(41),AW+s(6),s(2),c.goldL);
  r(AX+s(2),AY-s(26),AW,s(32),c.skin); r(AX+s(4),AY-s(24),AW-s(4),s(28),c.skin);
  r(AX+s(4),AY-s(20),s(5),s(5),'#000'); r(AX+s(5),AY-s(19),s(2),s(2),'#f8f8f8');
  r(AX+AW-s(7),AY-s(20),s(5),s(5),'#000'); r(AX+AW-s(6),AY-s(19),s(2),s(2),'#f8f8f8');
  r(AX+AW/2-s(2)|0,AY-s(14),s(5),s(4),c.skinD);
  r(AX+s(3),AY-s(7),AW-s(4),s(5),'#900000'); r(AX+s(5),AY-s(5),AW-s(8),s(4),'#f8c0c0');
  r(AX+s(5),AY-s(7),s(4),s(2),'#f8f8e0'); r(AX+AW-s(9),AY-s(7),s(4),s(2),'#f8f8e0');
  r(AX+s(3),AY-s(9),s(2),s(3),c.skinD); r(AX+AW-s(4),AY-s(9),s(2),s(3),c.skinD);
  const au=1+build*1.4;
  [-1,1].forEach(side=>{
    const ux2=side<0?AX-s(2):AX+AW-s(4);
    r(ux2,AY-s(8),s(8)*au*.55|0,s(4),c.beard);
    r(ux2+(side<0?-(s(4)*au*.35|0):s(5)*au*.3|0),AY-s(12),s(5)*au*.45|0,s(5),c.beard);
    r(ux2+(side<0?-(s(5)*au*.35|0):s(6)*au*.3|0),AY-s(17),s(4)*au*.4|0,s(6),c.beard);
    r(ux2+(side<0?-(s(4)*au*.3|0):s(5)*au*.28|0),AY-s(22),s(3)*au*.35|0,s(5),c.beardL);
  });
  r(AX+s(2),AY-s(2),AW-s(2),s(6),c.beard);
  r(AX+s(2),AY-s(40),AW-s(2),s(16),'#800000'); r(AX+s(4),AY-s(38),AW-s(6),s(12),'#a00000');
  r(AX,AY-s(40),AW+s(4),s(8),'#d8d8d8'); r(AX+s(2),AY-s(40),AW,s(5),'#e8e8e8');
  r(AX+s(4),AY-s(50),AW-s(4),s(12),'#600000'); r(AX+s(6),AY-s(56),AW-s(8),s(8),'#800000');
  r(AX+AW/2-s(4)|0,AY-s(56),s(8),s(3),c.gold); r(AX+AW/2-s(2)|0,AY-s(60),s(4),s(5),c.gold);
  r(AX+AW+s(6),AY-s(26),s(5),s(72),'#703808');
  r(AX+AW+s(6),AY-s(28),s(5),s(3),'#703808'); r(AX+AW+s(6),AY+s(44),s(5),s(3),'#703808');
  r(AX+AW+s(11),AY-s(26),s(3),s(72),'#c0c0a8');
  r(AX+AW+s(6),AY+s(6),s(22),s(3),'#703808'); r(AX+AW+s(26),AY+s(4),s(5),s(8),c.gold);
  r(AX-s(10),AY+s(6),s(9),s(26),'#703808'); r(AX-s(9),AY+s(4),s(7),s(5),c.gold);
  for(let i=0;i<4;i++) r(AX-s(8)+i,AY+s(2),s(2),s(5),'#c8a000');

  // Подпись
  r(0,H-18,W,18,'#000',.88);
  const posLbl=pose<.33?'рысь':pose<.66?'галоп':'дыбы';
  const skyLbl=mood<.25?'рассвет':mood<.5?'день':mood<.75?'закат':'ночь';
  t(4,H-6,`П${gen} тело:${build*100|0}% ${posLbl} ${skyLbl} фон:${bgd*100|0}%`,c.gold,8);

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" shape-rendering="crispEdges">${parts.join('')}</svg>`;
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
const genbar=document.getElementById('genbar');
for(let i=0;i<MAX_GEN;i++){
  const d=document.createElement('div');
  d.className='gb';d.id='g'+i;
  genbar.appendChild(d);
}
function updBar(){
  for(let i=0;i<MAX_GEN;i++){
    const el=document.getElementById('g'+i);
    el.className='gb'+(i<GEN-1?' done':i===GEN-1?' cur':'');
  }
}

function pick(dna, svgStr){
  // История
  const hi=document.createElement('div');hi.className='hi';
  const sp=document.createElement('p');sp.textContent='П'+GEN;
  hi.innerHTML=svgStr;hi.appendChild(sp);
  document.getElementById('hrow').appendChild(hi);

  if(GEN>=MAX_GEN){
    document.getElementById('grid').style.display='none';
    document.getElementById('tip').style.display='none';
    document.getElementById('winsvg').innerHTML=svgStr;
    document.getElementById('winbox').style.display='block';
    return;
  }
  GEN++;
  document.getElementById('status').textContent=`Поколение ${GEN} из ${MAX_GEN}`;
  document.getElementById('tip').textContent=`👆 Поколение ${GEN} из ${MAX_GEN} — выбери лучшего`;
  updBar();
  const t=Date.now();
  const v1=mutate(dna, t%98761+GEN*137);
  const v2=mutate(dna, (t+54321)%98761+GEN*317);
  showGrid([v1,v2]);
}

function showGrid(variants){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  variants.forEach((dna,i)=>{
    const svg=makeSVG(dna,GEN);
    const card=document.createElement('div');card.className='card';
    card.innerHTML=svg;
    const lbl=document.createElement('div');lbl.className='clabel';
    lbl.textContent=`ВАРИАНТ ${i+1} — НАЖМИ`;
    card.appendChild(lbl);
    card.addEventListener('click',()=>pick(dna,svg));
    grid.appendChild(card);
  });
}

function restart(){
  GEN=1;
  document.getElementById('grid').style.display='grid';
  document.getElementById('tip').style.display='block';
  document.getElementById('winbox').style.display='none';
  document.getElementById('hrow').innerHTML='';
  document.getElementById('status').textContent='Поколение 1 из 30';
  document.getElementById('tip').textContent='👆 Нажми на понравившегося богатыря';
  updBar();
  start();
}

function start(){
  const t=Date.now();
  showGrid([mkDNA(t%99991), mkDNA((t+7777)%99991)]);
}

updBar();
start();
</script>
